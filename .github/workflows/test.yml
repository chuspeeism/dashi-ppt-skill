name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20.x', '22.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: skills/dashiai-ppt/project/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: skills/dashiai-ppt/project
      - name: Run unit tests
        run: npm run test:version
        working-directory: skills/dashiai-ppt/project
